<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D PORTAL - Básico</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
  }
  #canvas-container {
    width: 100%;
    height: 100%;
    position: relative;
  }
  #message {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    padding: 12px 14px;
    font-size: 14px;
    background: rgba(0, 0, 0, 0.65);
    z-index: 2;
    text-align: center;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
<div id="canvas-container"></div>
<div id="message">Cargando modelo <strong>Examen.glb</strong>...</div>
<script>
  const container = document.getElementById('canvas-container');
  const message = document.getElementById('message');

  if (!window.WebGLRenderingContext) {
    message.innerText = 'WebGL no está disponible en este dispositivo.';
  }

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);

  const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(3, 2, 4);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);

  const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
  directionalLight.position.set(5, 10, 7);
  scene.add(directionalLight);

  const loader = new THREE.GLTFLoader();
  let model = null;

  loader.load(
    'Examen.glb',
    function (gltf) {
      model = gltf.scene;
      scene.add(model);
      fitModel();
      message.innerHTML = 'Modelo cargado. Rotando automáticamente.';
    },
    function (xhr) {
      if (xhr.lengthComputable) {
        const percent = Math.round((xhr.loaded / xhr.total) * 100);
        message.innerText = 'Cargando modelo: ' + percent + '%';
      }
    },
    function (error) {
      console.error(error);
      message.innerText = 'Error cargando Examen.glb. Verifique que el archivo esté en la misma carpeta.';
    }
  );

  function fitModel() {
    if (!model) return;
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    if (maxDim === 0) return;

    const fov = camera.fov * (Math.PI / 180);
    const distance = maxDim / (2 * Math.tan(fov / 2));
    camera.position.set(center.x + distance * 1.2, center.y + distance * 0.9, center.z + distance * 1.2);
    camera.lookAt(center);
    camera.updateProjectionMatrix();
  }

  function animate() {
    requestAnimationFrame(animate);
    if (model) {
      model.rotation.y += 0.002;
    }
    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', function () {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });
</script>
</body>
</html>
