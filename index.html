<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D TV PORTAL</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; color: #fff; font-family: sans-serif;
  }
  #canvas-container { width: 100%; height: 100%; position: relative; }
  #message {
    position: absolute; left: 50%; top: 20px; transform: translateX(-50%);
    padding: 10px 20px; font-size: 16px; background: rgba(0, 0, 0, 0.8);
    border-radius: 5px; z-index: 2; text-align: center; pointer-events: none;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

<div id="canvas-container"></div>
<div id="message">Iniciando...</div>

<script>
  const container = document.getElementById('canvas-container');
  const message = document.getElementById('message');

  // 1. Escena y Cámara
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);

  const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(0, 0, 5);

  // 2. Renderizador optimizado para Smart TV
  const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
  renderer.setPixelRatio(1); 
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);

  // 3. Iluminación básica
  const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
  directionalLight.position.set(2, 4, 3);
  scene.add(directionalLight);

  // 4. Carga del modelo (Estructura clásica garantizada)
  const modelUrl = './Examen.glb';
  const loader = new THREE.GLTFLoader();
  let model = null;

  message.innerText = 'Cargando Examen.glb (20MB)...';

  loader.load(
    modelUrl,
    function (gltf) {
      model = gltf.scene;
      scene.add(model);
      fitModel();
      message.style.display = 'none'; // Ocultar cartel al terminar
    },
    function (xhr) {
      if (xhr.lengthComputable) {
        const percent = Math.round((xhr.loaded / xhr.total) * 100);
        message.innerText = 'Cargando: ' + percent + '%';
      }
    },
    function (error) {
      console.error(error);
      message.innerText = 'Error al cargar el archivo .glb';
    }
  );

  // Ajustar la cámara automáticamente al tamaño de tu modelo
  function fitModel() {
    if (!model) return;
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    if (maxDim === 0) return;

    const fov = camera.fov * (Math.PI / 180);
    let distance = maxDim / (2 * Math.tan(fov / 2));
    distance *= 1.4; 

    camera.position.set(center.x, center.y + (size.y * 0.1), center.z + distance);
    camera.lookAt(center);
    camera.updateProjectionMatrix();
  }

  // 5. Animación continua
  function animate() {
    requestAnimationFrame(animate);
    if (model) {
      model.rotation.y += 0.005; 
    }
    renderer.render(scene, camera);
  }

  animate();

  // Redimensionamiento de pantalla
  window.addEventListener('resize', function () {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });
</script>
</body>
</html>
