<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D PORTAL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --bg-color: #f4f4f4;
    --text-color: #111111;
    --border-color: #999999;
    --accent-color: #333333;
    --font-main: 'Press Start 2P', monospace;
  }

  * { box-sizing: border-box; }

  body, html {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-main);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* CRT Overlay */
  .crt::before {
    content: " ";
    display: block;
    position: absolute;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(255, 255, 255, 0) 50%, rgba(200, 200, 200, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    z-index: 2;
    background-size: 100% 2px, 3px 100%;
    pointer-events: none;
  }

  header {
    height: 50px;
    border-bottom: 2px dashed var(--border-color);
    display: flex;
    align-items: center;
    padding: 0 10px;
    background-color: #e8e8e8;
    z-index: 10;
  }

  .logo { font-size: 14px; margin-right: 20px; color: var(--accent-color); }
  


  main {
    flex-grow: 1; display: flex; flex-direction: row; position: relative; height: calc(100% - 80px);
  }

  aside {
    width: 280px; min-width: 280px; border-right: 2px dashed var(--border-color);
    padding: 15px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; background-color: #eaeaea; z-index: 5;
  }

  .upload-zone {
    border: 2px dashed var(--border-color);
    height: 150px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 10px; position: relative;
    transition: all 0.3s;
    cursor: pointer;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent-color); background-color: rgba(0, 0, 0, 0.05);
  }
  .upload-prompt { font-size: 10px; line-height: 1.5; }
  .blink { animation: blinker 1s linear infinite; }
  @keyframes blinker { 50% { opacity: 0; } }

  .panel { border: 1px solid var(--border-color); padding: 10px; font-size: 10px; }
  .panel-title { margin: 0 0 10px 0; font-size: 12px; border-bottom: 1px dashed var(--border-color); padding-bottom: 5px; color: var(--accent-color); }
  .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .info-label { opacity: 0.7; }

  .btn {
    background: transparent; color: var(--text-color); font-family: var(--font-main); font-size: 10px;
    border: 2px solid var(--text-color); padding: 10px; cursor: pointer; text-transform: uppercase;
    transition: all 0.2s; text-align: center; width: 100%;
  }
  .btn:hover { background: var(--text-color); color: var(--bg-color); }
  .controls-group { display: flex; flex-direction: column; gap: 10px; }

  .control-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; font-size: 10px; }
  .control-label { color: var(--accent-color); }
  input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent-color); background: var(--bg-color); }
  select { width: 100%; background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color); padding: 5px; font-family: var(--font-main); font-size: 10px; cursor: pointer; }
  select:focus { outline: 1px dashed var(--accent-color); }

  .viewport-container {
    flex-grow: 1; position: relative; background-color: #ffffff;
  }
  #canvas-container { width: 100%; height: 100%; }
  
  .corner-accent { position: absolute; width: 30px; height: 30px; z-index: 5; opacity: 0.5; pointer-events: none; }
  .corner-tl { top: 10px; left: 10px; border-top: 4px solid var(--border-color); border-left: 4px solid var(--border-color); }
  .corner-br { bottom: 10px; right: 10px; border-bottom: 4px solid var(--border-color); border-right: 4px solid var(--border-color); }

  footer {
    height: 30px; border-top: 2px dashed var(--border-color); background-color: #e8e8e8;
    display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
    font-size: 10px; z-index: 10;
  }
  
  .loading-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8);
    display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 20;
  }
  .loading-text { margin-bottom: 15px; font-size: 12px; }
  .progress-bar-retro { font-size: 16px; letter-spacing: 2px; }

  /* Checkerboard */
  .checkerboard {
    background-image: linear-gradient(45deg, #dddddd 25%, transparent 25%, transparent 75%, #dddddd 75%, #dddddd), linear-gradient(45deg, #dddddd 25%, transparent 25%, transparent 75%, #dddddd 75%, #dddddd);
    background-size: 10px 10px; background-position: 0 0, 5px 5px;
  }

  @media (max-width: 768px) {
    main { flex-direction: column; overflow-y: auto; overflow-x: hidden; }
    aside { width: 100%; min-width: 100%; height: auto; flex-shrink: 0; border-right: none; border-bottom: none; border-top: 2px dashed var(--border-color); overflow: visible; order: 2; }
    .viewport-container { height: 60vh; flex-grow: 0; flex-shrink: 0; order: 1; }
  }
</style>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>
</head>
<body class="crt">

<header class="checkerboard">
  <div class="logo">3D_PORTAL</div>
</header>

<main>
  <aside>
    <div class="panel" style="text-align: center; padding: 20px;">
      <h3 class="panel-title">MODELO</h3>
      <div><span class="blink">&gt;&gt;&gt;</span> EXAMEN.GLB</div>
    </div>

    <div class="panel">
      <h3 class="panel-title">DATOS_DEL_ARCHIVO</h3>
      <div class="info-row"><span class="info-label">NOMBRE:</span> <span id="info-name">N/A</span></div>
      <div class="info-row"><span class="info-label">TAMAÑO:</span> <span id="info-size">0 KB</span></div>
      <div class="info-row"><span class="info-label">VÉRTICES:</span> <span id="info-verts">0</span></div>
      <div class="info-row"><span class="info-label">POLÍGONOS:</span> <span id="info-polys">0</span></div>
    </div>

    <div class="panel">
      <h3 class="panel-title">AJUSTES</h3>
      <div class="control-row">
        <label class="control-label" for="brightness-slider">BRIGHTNESS: <span id="brightness-val">100%</span></label>
        <input type="range" id="brightness-slider" min="0" max="200" value="100">
      </div>
      <div class="control-row">
        <label class="control-label" for="zoom-slider">ZOOM: <span id="zoom-val">1.0x</span></label>
        <input type="range" id="zoom-slider" min="10" max="300" value="100">
      </div>
      <div class="control-row">
        <label class="control-label" for="pan-x-slider">PAN X: <span id="pan-x-val">0.0</span></label>
        <input type="range" id="pan-x-slider" min="-50" max="50" value="0">
      </div>
      <div class="control-row">
        <label class="control-label" for="pan-y-slider">PAN Y: <span id="pan-y-val">0.0</span></label>
        <input type="range" id="pan-y-slider" min="-50" max="50" value="0">
      </div>
      <div class="control-row">
        <label class="control-label" for="material-select">MATERIAL:</label>
        <select id="material-select">
          <option value="default">POR DEFECTO</option>
          <option value="phong">GRIS BRILLANTE</option>
          <option value="standard">ESTÁNDAR (PBR)</option>
          <option value="wireframe">MALLA OSCURA</option>
        </select>
      </div>
    </div>

    <div class="controls-group">
      <button class="btn" id="btn-wireframe">ALTERNAR MALLA</button>
      <button class="btn" id="btn-rotate">ALTERNAR AUTO-ROTACIÓN</button>
      <button class="btn" id="btn-reset">RESETEAR CÁMARA</button>
    </div>
  </aside>

  <div class="viewport-container">
    <div class="corner-accent corner-tl"></div>
    <div class="corner-accent corner-br"></div>
    <div id="canvas-container"></div>
    <div class="loading-overlay" id="loading-overlay">
      <div class="loading-text blink">CARGANDO DATOS DEL MODELO...</div>
      <div class="progress-bar-retro" id="progress-bar">░░░░░░░░░░</div>
    </div>
  </div>
</main>

<footer>
  <div id="status-left">ESTADO: INACTIVO</div>
  <div id="status-right">SYS.v.1.0.4</div>
</footer>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
  import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
  import { STLLoader } from 'three/addons/loaders/STLLoader.js';

  // --- Setup Scene ---
  const container = document.getElementById('canvas-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);

  const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(5, 5, 5);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.listenToKeyEvents(window);
  controls.keys = { LEFT: 'ArrowLeft', UP: 'ArrowUp', RIGHT: 'ArrowRight', BOTTOM: 'ArrowDown' };

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1);
  dirLight.position.set(5, 10, 7.5);
  scene.add(dirLight);

  // Helper
  const gridHelper = new THREE.GridHelper(20, 20, 0x888888, 0xdddddd);
  scene.add(gridHelper);

  // Animation Loop
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // Window Resize
  window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });

  // --- App Logic ---
  let currentModel = null;
  let isWireframe = false;

  // Removed upload elements
  const loadingOverlay = document.getElementById('loading-overlay');
  const progressBar = document.getElementById('progress-bar');
  
  const infoName = document.getElementById('info-name');
  const infoSize = document.getElementById('info-size');
  const infoVerts = document.getElementById('info-verts');
  const infoPolys = document.getElementById('info-polys');
  const statusLeft = document.getElementById('status-left');
  const brightnessSlider = document.getElementById('brightness-slider');
  const brightnessVal = document.getElementById('brightness-val');
  const materialSelect = document.getElementById('material-select');

  const zoomSlider = document.getElementById('zoom-slider');
  const zoomVal = document.getElementById('zoom-val');
  const panXSlider = document.getElementById('pan-x-slider');
  const panXVal = document.getElementById('pan-x-val');
  const panYSlider = document.getElementById('pan-y-slider');
  const panYVal = document.getElementById('pan-y-val');

  let initialTarget = new THREE.Vector3(0, 0, 0);
  let modelBaseScale = 1;

  zoomSlider.addEventListener('input', (e) => {
    const val = parseInt(e.target.value);
    zoomVal.innerText = (val / 100).toFixed(1) + 'x';
    if (currentModel) {
       const scale = (val / 100) * modelBaseScale;
       currentModel.scale.set(scale, scale, scale);
    }
  });

  panXSlider.addEventListener('input', (e) => {
    const val = parseInt(e.target.value) / 10;
    panXVal.innerText = val.toFixed(1);
    controls.target.x = initialTarget.x + val;
  });

  panYSlider.addEventListener('input', (e) => {
    const val = parseInt(e.target.value) / 10;
    panYVal.innerText = val.toFixed(1);
    controls.target.y = initialTarget.y + val;
  });

  const originalMaterials = new Map();

  brightnessSlider.addEventListener('input', (e) => {
    const val = e.target.value;
    brightnessVal.innerText = val + '%';
    const intensity = val / 100;
    dirLight.intensity = intensity;
    ambientLight.intensity = intensity * 0.5;
  });

  materialSelect.addEventListener('change', (e) => {
    applyMaterialOverride(e.target.value);
  });

  // Event listeners for drag and drop removed

  function showLoading(show) {
    loadingOverlay.style.display = show ? 'flex' : 'none';
  }

  function updateProgress(xhr) {
    if (xhr.lengthComputable) {
      const percent = Math.round((xhr.loaded / xhr.total) * 10);
      let bar = '';
      for (let i=0; i<10; i++) bar += (i < percent) ? '█' : '░';
      progressBar.innerText = bar;
    }
  }

  function formatBytes(bytes, decimals = 2) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024, dm = decimals < 0 ? 0 : decimals;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
  }

  function analyzeModel(model) {
    let verts = 0, polys = 0;
    model.traverse((child) => {
      if (child.isMesh) {
        if (child.geometry.attributes.position) verts += child.geometry.attributes.position.count;
        if (child.geometry.index) polys += child.geometry.index.count / 3;
        else if (child.geometry.attributes.position) polys += child.geometry.attributes.position.count / 3;
      }
    });
    infoVerts.innerText = verts.toLocaleString();
    infoPolys.innerText = Math.round(polys).toLocaleString();
  }

  function fitCameraToObject(object) {
    const box = new THREE.Box3().setFromObject(object);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    
    const maxDim = Math.max(size.x, size.y, size.z);
    const fov = camera.fov * (Math.PI / 180);
    let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
    cameraZ *= 1.5; 

    camera.position.set(center.x + cameraZ * 0.5, center.y + cameraZ * 0.5, center.z + cameraZ);
    camera.lookAt(center);
    controls.target.copy(center);
    controls.update();
  }

  function loadDefaultModel() {
    showLoading(true);
    progressBar.innerText = '░░░░░░░░░░';
    
    infoName.innerText = 'Examen.glb';
    infoSize.innerText = '36.2 MB';
    statusLeft.innerText = "ESTADO: CARGANDO...";

    const manager = new THREE.LoadingManager();
    const loader = new GLTFLoader(manager);
    
    loader.load(
      'Examen.glb',
      (gltf) => {
        if (currentModel) scene.remove(currentModel);
        currentModel = gltf.scene;
        onModelLoaded();
      },
      (xhr) => {
        updateProgress(xhr);
      },
      (err) => {
        console.error(err);
        alert('Error al cargar el modelo por defecto.');
        showLoading(false);
        statusLeft.innerText = "ESTADO: ERROR";
      }
    );
  }

  function onModelLoaded() {
    scene.add(currentModel);
    
    // Normalize scale and position somewhat
    const box = new THREE.Box3().setFromObject(currentModel);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    let scale = 1;
    if (maxDim > 50) {
      scale = 50 / maxDim;
      currentModel.scale.set(scale, scale, scale);
    }
    modelBaseScale = scale;
    
    // Recalculate after scale
    fitCameraToObject(currentModel);
    initialTarget.copy(controls.target);
    zoomSlider.value = 100;
    zoomVal.innerText = "1.0x";
    panXSlider.value = 0;
    panXVal.innerText = "0.0";
    panYSlider.value = 0;
    panYVal.innerText = "0.0";
    analyzeModel(currentModel);
    
    originalMaterials.clear();
    currentModel.traverse((child) => {
      if (child.isMesh) {
        originalMaterials.set(child, child.material);
      }
    });

    // reset material dropdown when new model loads
    materialSelect.value = 'default';
    
    applyWireframe();
    
    showLoading(false);
    statusLeft.innerText = "ESTADO: MODELO_CARGADO";
  }

  function applyMaterialOverride(type) {
    if (!currentModel) return;
    
    currentModel.traverse((child) => {
      if (child.isMesh) {
        const origMat = originalMaterials.get(child);
        if (!origMat) return;

        if (type === 'default') {
          child.material = origMat;
        } else if (type === 'phong') {
          child.material = new THREE.MeshPhongMaterial({ color: 0xa0a0a0, specular: 0x666666, shininess: 60 });
        } else if (type === 'standard') {
          child.material = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.6, roughness: 0.2 });
        } else if (type === 'wireframe') {
          child.material = new THREE.MeshBasicMaterial({ color: 0x333333, wireframe: true });
        }
        
        if (type !== 'wireframe') {
          applyWireframeToMesh(child);
        }
      }
    });
  }

  function applyWireframeToMesh(mesh) {
    if (Array.isArray(mesh.material)) {
        mesh.material.forEach(mat => {
          if (mat.wireframe !== undefined) mat.wireframe = isWireframe;
        });
    } else {
        if (mesh.material && mesh.material.wireframe !== undefined) mesh.material.wireframe = isWireframe;
    }
  }

  function applyWireframe() {
    if (!currentModel) return;
    const type = materialSelect.value;
    if (type === 'wireframe') return; // pure wireframe mat doesn't need toggle
    currentModel.traverse((child) => {
      if (child.isMesh) {
        applyWireframeToMesh(child);
      }
    });
  }

  document.getElementById('btn-wireframe').addEventListener('click', () => {
    isWireframe = !isWireframe;
    applyWireframe();
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    if (currentModel) fitCameraToObject(currentModel);
  });

  let isAutoRotate = false;
  document.getElementById('btn-rotate').addEventListener('click', () => {
    isAutoRotate = !isAutoRotate;
    controls.autoRotate = isAutoRotate;
    controls.autoRotateSpeed = 2.0;
  });

  // Load default model on init
  loadDefaultModel();

</script>
</body>
</html>
